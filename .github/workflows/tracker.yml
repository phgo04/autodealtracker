name: CX-5 Tracker

on:
  schedule:
    - cron: '0 12 */3 * *'   # every 3 days at noon UTC (8am EDT)
  workflow_dispatch:           # manual trigger from GitHub mobile app

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allows the workflow to commit state files back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Run tracker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
        run: python run_tracker.py

      - name: Commit updated state
        run: |
          git config user.name "cx5-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/listings.json state/alerts_sent.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "state: run $(date +%Y-%m-%d)"
          git push
