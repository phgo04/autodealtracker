name: AutoDealTracker

on:
  #schedule:
#    - cron: '0 12 */3 * *'   # every 3 days at noon UTC (8am EDT)
  workflow_dispatch:           # manual trigger from GitHub mobile app

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allows the workflow to commit state files back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper for all cars
        run: |
          python scraper.py --car cx5
          python scraper.py --car crv

      - name: Run tracker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
        run: python run_tracker.py

      - name: Publish to GitHub Pages
        run: python publish_pages.py

      - name: Commit state and pages
        run: |
          git config user.name "autodealtracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ docs/
          git diff --staged --quiet || git commit -m "state+pages: run $(date +%Y-%m-%d)"
          git push
