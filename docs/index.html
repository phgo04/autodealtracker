<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoDealTracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 32px 28px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,.09);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    h1 { font-size: 1.45rem; font-weight: 700; color: #0f172a; margin-bottom: 12px; }
    p  { color: #64748b; font-size: 0.95rem; line-height: 1.5; }
    .badge {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 20px;
      background: #f1f5f9;
      border-radius: 8px;
      color: #475569;
      font-size: 0.85rem;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AutoDealTracker</h1>
    <p>No reports generated yet.</p>
    <p style="margin-top:8px">Trigger the workflow from the GitHub Actions tab to generate the first report.</p>
    <div class="badge">Actions → AutoDealTracker → Run workflow</div>
  </div>
</body>
</html>
