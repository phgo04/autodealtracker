<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoDealTracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 32px 28px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,.09);
      width: 100%;
      max-width: 420px;
    }
    h1 {
      font-size: 1.45rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
    }
    .sub {
      color: #64748b;
      font-size: 0.88rem;
      margin-bottom: 28px;
    }
    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    a {
      display: block;
      padding: 16px 20px;
      background: #2563eb;
      color: #fff;
      border-radius: 11px;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    a:active { opacity: 0.88; }
    .footer {
      color: #94a3b8;
      font-size: 0.78rem;
      margin-top: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AutoDealTracker</h1>
    <p class="sub">Ontario dealer inventory &mdash; updated every 3 days</p>
    <ul>
    <li><a href="cx5.html">Mazda CX-5</a></li>
    </ul>
    <p class="footer">Last updated: 2026-05-02</p>
  </div>
</body>
</html>
